<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#d10a11" />
  <title>Relatório Diário — Edna</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div id="app"></div>

  <!-- Barra de status de sincronização -->
  <div id="sync-toast" class="toast" hidden></div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      var swRefreshing = false;
      var hadController = !!navigator.serviceWorker.controller;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (!hadController) { hadController = true; return; } // 1a instalação: não recarrega
        if (swRefreshing) return;
        swRefreshing = true;
        window.location.reload(); // versão nova ativou → recarrega sozinho
      });
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').then(function (reg) {
          reg.update();
          setInterval(function () { reg.update(); }, 30 * 60 * 1000); // checa a cada 30 min
        }).catch(function () {});
      });
    }
  </script>
</body>
</html>
