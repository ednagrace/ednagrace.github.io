<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#e8734e" />
  <!-- iOS installed app: make the status bar translucent so the app header shows behind it
       (the clock/network overlay the header color). This makes the top strip follow the
       configured color instead of a fixed system bar. -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Relatório Diário — Edna</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="styles.css?v=46" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div id="app"></div>

  <!-- Barra de status de sincronização -->
  <div id="sync-toast" class="toast" hidden></div>

  <script src="app.js?v=46"></script>
  <script>
    if ('serviceWorker' in navigator) {
      var swRefreshing = false;
      var hadController = !!navigator.serviceWorker.controller;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (!hadController) { hadController = true; return; } // 1a instalação: não recarrega
        if (swRefreshing) return;
        swRefreshing = true;
        window.location.reload(); // versão nova ativou → recarrega sozinho
      });
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').then(function (reg) {
          reg.update();
          // checa versão nova sempre que o app volta para a tela (e a cada 15 min)
          document.addEventListener('visibilitychange', function () {
            if (!document.hidden) reg.update();
          });
          setInterval(function () { reg.update(); }, 15 * 60 * 1000);
          // se uma versão nova já estiver esperando, ativa na hora
          if (reg.waiting) reg.waiting.postMessage('SKIP_WAITING');
          reg.addEventListener('updatefound', function () {
            var novo = reg.installing;
            if (!novo) return;
            novo.addEventListener('statechange', function () {
              if (novo.state === 'installed' && reg.waiting) reg.waiting.postMessage('SKIP_WAITING');
            });
          });
        }).catch(function () {});
      });
    }
  </script>
</body>
</html>
